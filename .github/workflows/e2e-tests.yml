name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Allow the Allure report to be published to GitHub Pages.
permissions:
  contents: write

jobs:
  lwc-unit-tests:
    name: LWC Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # Use `npm install` (not `npm ci`): the lockfile is generated on macOS,
        # where the native rolldown binding is used, so it omits the wasm
        # binding's transitive deps (@emnapi/*) that Linux runners require.
        run: npm install --no-audit --no-fund

      - name: Run LWC unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload LWC coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lwc-coverage
          path: coverage
          retention-days: 30

  e2e-tests:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        # chromium is always needed because global-setup authenticates with it
        # and shares the session via storageState across the matrix browser.
        run: npx playwright install --with-deps chromium ${{ matrix.browser }}

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate to Salesforce org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > ./sfdx-auth-url.txt
          sf org login sfdx-url --sfdx-url-file ./sfdx-auth-url.txt --alias ci-org --set-default
          rm ./sfdx-auth-url.txt

      - name: Create .env file
        run: |
          cat > .env <<EOF
          PORTAL_URL=${{ secrets.PORTAL_URL }}
          SF_TARGET_ORG=ci-org
          SF_SITE_ID=${{ secrets.SF_SITE_ID }}
          SF_COMMUNITY_PATH=${{ secrets.SF_COMMUNITY_PATH }}
          EOF

      - name: Run Playwright tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results
          retention-days: 7

      - name: Upload Playwright report (${{ matrix.browser }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report
          retention-days: 30

  visual-tests:
    name: Visual Regression (chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate to Salesforce org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > ./sfdx-auth-url.txt
          sf org login sfdx-url --sfdx-url-file ./sfdx-auth-url.txt --alias ci-org --set-default
          rm ./sfdx-auth-url.txt

      - name: Create .env file
        run: |
          cat > .env <<EOF
          PORTAL_URL=${{ secrets.PORTAL_URL }}
          SF_TARGET_ORG=ci-org
          SF_SITE_ID=${{ secrets.SF_SITE_ID }}
          SF_COMMUNITY_PATH=${{ secrets.SF_COMMUNITY_PATH }}
          EOF

      - name: Run visual regression tests
        run: npx playwright test --project=visual

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-visual
          path: allure-results
          retention-days: 7

      - name: Upload visual diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-visual
          path: playwright-report
          retention-days: 30

  publish-report:
    name: Publish Allure Report
    needs: [e2e-tests, visual-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java (required for Allure report)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Download Allure results from all browsers
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Load previous Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-history

      - name: Restore Allure history for trends
        run: |
          mkdir -p allure-results/history
          if [ -d "gh-pages-history/history" ]; then
            cp -r gh-pages-history/history/. allure-results/history/
          fi

      - name: Generate Allure report
        run: npm run allure:generate

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Publish Allure report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          keep_files: false
