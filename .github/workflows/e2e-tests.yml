name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Allow the Allure report to be published to GitHub Pages.
permissions:
  contents: write

jobs:
  lwc-unit-tests:
    name: LWC Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run LWC unit tests
        run: npm run test:unit:coverage

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java (required for Allure report)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate to Salesforce org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > ./sfdx-auth-url.txt
          sf org login sfdx-url --sfdx-url-file ./sfdx-auth-url.txt --alias ci-org --set-default
          rm ./sfdx-auth-url.txt

      - name: Create .env file
        run: |
          cat > .env <<EOF
          PORTAL_URL=${{ secrets.PORTAL_URL }}
          SF_TARGET_ORG=ci-org
          SF_SITE_ID=${{ secrets.SF_SITE_ID }}
          SF_COMMUNITY_PATH=${{ secrets.SF_COMMUNITY_PATH }}
          EOF

      - name: Run Playwright tests
        id: tests
        run: npm run test:e2e

      - name: Load previous Allure history
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-history

      - name: Restore Allure history for trends
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d "gh-pages-history/history" ]; then
            cp -r gh-pages-history/history/. allure-results/history/
          fi

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Publish Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          keep_files: false

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
